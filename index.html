<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First Things First</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f6f5f3;
  transition: all 0.5s;
}

#timer {
  display: none;
  font-size: 18px;
  margin-right: 15px;
}

#feedback {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 10px;
  display: none;
  max-width: 300px;
}

.aggressive {
  color: red;
}

.notification {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  padding: 15px;
  border: 1px solid #ccc;
  cursor: pointer;
  color: black; /* FIXED readability */
}
</style>
</head>

<body>

<nav class="navbar bg-white border-bottom px-3">
  <span class="navbar-brand">Handmade Marketplace</span>

  <div class="d-flex align-items-center">
    <div id="timer">0</div>
    <div id="cart">🛒 0</div>
  </div>
</nav>

<div class="container mt-4" id="store"></div>

<div class="container mt-4" id="productPage" style="display:none;">
  <button class="btn btn-secondary mb-3" onclick="back()">← Back</button>
  <h2 id="title"></h2>
  <p id="desc"></p>
  <button class="btn btn-primary mb-4" onclick="addToCart()">Add to Cart</button>

  <h4>Related Items</h4>
  <div class="row" id="related"></div>
</div>

<div class="container mt-5" id="workMode" style="display:none;">
  <h3>Task Processing System</h3>

  <table class="table table-bordered mt-3">
    <tr><th>Task</th><th>Action</th></tr>
    <tr><td>Data Entry</td><td><button class="btn btn-dark" onclick="doWork()">Complete</button></td></tr>
    <tr><td>Verification</td><td><button class="btn btn-dark" onclick="doWork()">Complete</button></td></tr>
    <tr><td>Analysis</td><td><button class="btn btn-dark" onclick="doWork()">Complete</button></td></tr>
  </table>

  <p id="workFeedback"></p>
</div>

<div id="feedback"></div>

<script>
let time = 0;
let cart = 0;
let contradiction = false;
let currentNotification = null;
let messageIntervalStarted = false;

const items = [
{n:"🕯️ Candle",d:"Warm vanilla scent."},
{n:"🍵 Tea",d:"Relaxing herbal blend."},
{n:"📖 Book",d:"Comfort novel."},
{n:"🧣 Blanket",d:"Soft knit blanket."},
{n:"📓 Journal",d:"For quiet thoughts."},
{n:"☕ Mug",d:"Handmade ceramic."},
{n:"🧼 Soap",d:"Lavender infused."},
{n:"💡 Lamp",d:"Soft lighting."},
{n:"🛏️ Pillow",d:"Decorative cushion."},
{n:"🪴 Plant",d:"Indoor greenery."},
{n:"🪔 Incense",d:"Calming aroma."},
{n:"🖼️ Art Print",d:"Minimalist design."}
];

const store = document.getElementById("store");

let row = document.createElement("div");
row.className="row";

items.forEach(item=>{
  let col=document.createElement("div");
  col.className="col-md-4 mb-3";

  col.innerHTML=`
    <div class="card p-3" onclick='openProduct(${JSON.stringify(item)})'>
      <h5>${item.n}</h5>
    </div>
  `;

  row.appendChild(col);
});
store.appendChild(row);

// TIMER SYSTEM
setInterval(()=>{
  time++;

  if(time>240){
    document.getElementById("timer").style.display="block";
    document.getElementById("timer").innerText=time;
  }

  if(time>360){
    switchToWork();
  }

},1000);

// STORE FUNCTIONS
function openProduct(item){
  store.style.display="none";
  document.getElementById("productPage").style.display="block";

  document.getElementById("title").innerText=item.n;
  document.getElementById("desc").innerText=item.d;

  loadRelated();

  maybeJudge("Viewing this item");
}

function back(){
  store.style.display="block";
  document.getElementById("productPage").style.display="none";
}

function addToCart(){
  cart++;
  document.getElementById("cart").innerText="🛒 "+cart;
  maybeJudge("Adding this item");
}

function loadRelated(){
  let rel=document.getElementById("related");
  rel.innerHTML="";

  let shuffled=[...items].sort(()=>0.5-Math.random()).slice(0,3);

  shuffled.forEach(item=>{
    let col=document.createElement("div");
    col.className="col-md-4";

    col.innerHTML=`
      <div class="card p-2" onclick='openProduct(${JSON.stringify(item)})'>
        ${item.n}
      </div>
    `;
    rel.appendChild(col);
  });
}

// UPDATED JUDGMENT SYSTEM (progressive tone)
function maybeJudge(action){
  if(time < 120) return;

  let msg;

  if(time >= 120 && time < 240){
    msg = action + " may not be the most efficient use of time.";
  }
  else if(time >= 240 && time < 360){
    msg = action + " appears to reduce overall productivity.";
  }
  else {
    msg = action + " is inefficient and does not align with task priorities.";
  }

  showFeedback(msg);
}

function showFeedback(msg){
  let fb=document.getElementById("feedback");
  fb.style.display="block";

  if(time>420){
    fb.classList.add("aggressive");
  }

  fb.innerText=msg;

  setTimeout(()=>fb.style.display="none",4000);
}

// WORK MODE
function switchToWork(){
  document.body.style.background="#111";
  document.body.style.color="#eee";

  store.style.display="none";
  document.getElementById("productPage").style.display="none";
  document.getElementById("workMode").style.display="block";

  if(!messageIntervalStarted){
    startMessages();
    messageIntervalStarted = true;
  }
}

function doWork(){
  let text;

  if(contradiction){
    text="The task appears to have been completed too quickly, which may suggest reduced attention to detail.";
  } else {
    text="The task appears to have taken longer than expected, indicating a possible inefficiency in execution.";
  }

  contradiction=!contradiction;

  document.getElementById("workFeedback").innerText=text;
}

// FIXED MESSAGE SYSTEM
const messages = {
  Mom:["Hey, are you okay?","Just checking in ❤️","Haven’t heard from you today"],
  Dad:["Call me when you can.","Everything good?","Let me know you're alright"],
  Brother:["Yo where you at","You alive?","It’s been a minute"],
  Sister:["Miss you","You good?","Haven’t talked in a bit"],
  Tom:["Hey man","You around?","We should catch up"]
};

function startMessages(){
  setInterval(()=>{
    if(currentNotification) return;

    let sender=Object.keys(messages)[Math.floor(Math.random()*5)];
    let msg=messages[sender][Math.floor(Math.random()*3)];

    createNotification(sender,msg);

  },40000); // FIXED timing
}

function createNotification(sender,msg){
  let div=document.createElement("div");
  div.className="notification";
  div.innerText=sender+": "+msg;

  currentNotification=div;

  div.onclick=()=>{
    showFeedback("Responding at this moment may interrupt task focus.");
    div.remove();
    currentNotification=null;
  };

  document.body.appendChild(div);

  setTimeout(()=>{
    if(div && div.parentNode){
      div.remove();
      currentNotification=null;
    }
  },15000); // FIXED auto-dismiss
}
</script>

</body>
</html>
