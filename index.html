<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First Things First</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/style.css">
</head>

<body>

<nav class="navbar bg-white border-bottom px-3">
  <span class="navbar-brand">Handmade Marketplace</span>

  <div class="search-wrapper mx-auto">
  <input
    type="text"
    class="form-control search-bar"
    placeholder="Search for anything">
</div>

<div class="d-flex align-items-center gap-3">
    <div id="timer">0</div>
    <div id="cart">🛒 0</div>
  </div>
</nav>

<div class="categories d-flex gap-3 px-4 py-3">

  <span class="category-pill">Self Care</span>
  <span class="category-pill">Books</span>
  <span class="category-pill">Relaxation</span>
  <span class="category-pill">Home</span>
  <span class="category-pill">Handmade</span>
  <span class="category-pill">Art</span>

</div>

<section class="hero">

  <div>

    <h1>
      Small comforts for everyday life
    </h1>

    <p>
      Handmade objects curated for calm spaces,
      slow mornings, and quiet moments.
    </p>

  </div>

</section>

<div id="score">
  100%
</div>

<div class="container mt-4" id="store"></div>

<div class="container mt-4" id="productPage" style="display:none;">
  <button class="btn btn-secondary mb-3" onclick="back()">← Back</button>
<div class="row">

  <div class="col-md-6">
    <img id="productImage"
    class="product-detail-img">
  </div>

  <div class="col-md-6 product-detail-info">

    <h2 id="title"></h2>

    <p id="seller"></p>

    <h4 id="price"></h4>

    <p id="desc"></p>

    <button class="btn btn-dark mt-3"
    onclick="addToCart()">
      Add to Cart
    </button>

  </div>

</div>

  <h4>Related Items</h4>
  <div class="row" id="related"></div>
</div>

<div class="container mt-5" id="workMode" style="display:none;">
  <h3>Task Processing System</h3>

  <table class="table table-bordered mt-3">
    <tr><th>Task</th><th>Action</th></tr>
    <tr><td>Data Entry</td><td><button class="btn btn-dark" onclick="doWork()">Complete</button></td></tr>
    <tr><td>Verification</td><td><button class="btn btn-dark" onclick="doWork()">Complete</button></td></tr>
    <tr><td>Analysis</td><td><button class="btn btn-dark" onclick="doWork()">Complete</button></td></tr>
  </table>

  <p id="workFeedback"></p>
</div>

<div id="feedback"></div>

<script src="script.js"></script>

</body>
</html>
